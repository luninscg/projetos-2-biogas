# Apresentação estática em http://<host>/entrega/
# Na VM: copie a pasta `entrega/` e este ficheiro + `deploy/nginx-entrega.conf`, depois:
#   docker compose -f docker-compose.entrega.yml up -d
# Porta padrão 8080 (altere em `ports` se precisar).

services:
  entrega-web:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./entrega:/usr/share/nginx/html/entrega:ro
      - ./deploy/nginx-entrega.conf:/etc/nginx/conf.d/default.conf:ro
